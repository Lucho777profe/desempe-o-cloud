<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Evaluación</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5">

<div class="container">
<h2 class="mb-4">Evaluación de Desempeño</h2>

<input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre del empleado">

<select id="prod" class="form-select mb-2">
<option value="">Productividad</option>
<option value="3">Alta</option>
<option value="2">Media</option>
<option value="1">Baja</option>
</select>

<select id="punt" class="form-select mb-2">
<option value="">Puntualidad</option>
<option value="3">Alta</option>
<option value="2">Media</option>
<option value="1">Baja</option>
</select>

<select id="team" class="form-select mb-2">
<option value="">Trabajo en equipo</option>
<option value="3">Alta</option>
<option value="2">Media</option>
<option value="1">Baja</option>
</select>

<button id="evaluar" class="btn btn-primary">Evaluar</button>

<div id="resultado" class="mt-4"></div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$("#evaluar").click(function(){
let nombre=$("#nombre").val();
let p=parseInt($("#prod").val());
let pu=parseInt($("#punt").val());
let t=parseInt($("#team").val());

if(nombre==""||!p||!pu||!t){
$("#resultado").html("<div class='alert alert-danger'>Complete todos los campos</div>");
return;
}

let total=p+pu+t;
let nivel="";

if(total>=8){nivel="Excelente";}
else if(total>=5){nivel="Aceptable";}
else{nivel="Bajo";}

$("#resultado").html(
"<div class='alert alert-info'>Empleado: "+nombre+
"<br>Puntaje: "+total+
"<br>Nivel: "+nivel+"</div>"
);
});
</script>

</body>
</html>
